* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #111; color: #eee; display: flex; flex-direction: column; height: 100vh; }

header h1 { font-size: 16px; font-weight: 600; color: #a8d8ea; }

.ctrls { display: flex; gap: 8px; margin-left: auto; align-items: center; }

#main { display: flex; flex: 1; overflow: hidden; }
#graph { flex: 1; }
#sb { width: 280px; background: #1a1a2e; border-left: 1px solid #333; padding: 16px; overflow-y: auto; font-size: 12px; }
#sb h2 { font-size: 13px; color: #a8d8ea; margin-bottom: 10px; }
#nd { color: #ccc; line-height: 1.7; }
.stats { background: #222; border-radius: 6px; padding: 10px; margin-bottom: 12px; }
.stats div { display: flex; justify-content: space-between; margin-bottom: 3px; }
.v { color: #4e79a7; font-weight: 600; }
.leg h3 { font-size: 11px; color: #888; margin: 12px 0 4px; text-transform: uppercase; }
.li { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; font-size: 11px; color: #aaa; }
.ll { width: 24px; height: 2px; flex-shrink: 0; }

let net=null,nds=null,eds=null;
function init(){
  nds=new vis.DataSet(RN);eds=new vis.DataSet(RE);
  const comms=[...new Set(RN.map(n=>n.group))].sort((a,b)=>a-b);
  const sel=document.getElementById('fcomm');
  comms.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent='Comm '+c;sel.appendChild(o);});
  net=new vis.Network(document.getElementById('graph'),{nodes:nds,edges:eds},{
    physics:{enabled:true,solver:'forceAtlas2Based',forceAtlas2Based:{gravitationalConstant:-30,centralGravity:0.003,springLength:120,springConstant:0.08},maxVelocity:50,stabilization:{iterations:200}},
    interaction:{hover:true,tooltipDelay:200,hideEdgesOnDrag:true},
    edges:{smooth:{type:'continuous',roundness:0.2}},
    nodes:{shape:'dot'},layout:{improvedLayout:false}
  });
  net.on('click',p=>{if(p.nodes.length){const n=RN.find(x=>x.id===p.nodes[0]);if(n)detail(n.id,n);}});
}
function detail(nid,node){
  const out=RE.filter(e=>e.from===nid).slice(0,12);
  const inc=RE.filter(e=>e.to===nid).slice(0,12);
  const info=node.title.split(' | ');
  let h='<b>'+node.label+'</b><br><div style="color:#888;margin:4px 0 8px">'+info.slice(1).join('<br>')+'</div>';
  if(out.length){h+='<b style="color:#4e79a7">Out ('+out.length+')</b><ul style="margin:4px 0 8px 14px">';out.forEach(e=>{const t=RN.find(n=>n.id===e.to);h+='<li>'+e.title.split(' [')[0]+' &rarr; <span style="color:#a8d8ea">'+(t?t.label:e.to)+'</span></li>';});h+='</ul>';}
  if(inc.length){h+='<b style="color:#59a14f">In ('+inc.length+')</b><ul style="margin:4px 0 8px 14px">';inc.forEach(e=>{const s=RN.find(n=>n.id===e.from);h+='<li><span style="color:#a8d8ea">'+(s?s.label:e.from)+'</span> &rarr; '+e.title.split(' [')[0]+'</li>';});h+='</ul>';}
  document.getElementById('nd').innerHTML=h;
}
document.getElementById('search').addEventListener('input',e=>{
  const q=e.target.value.toLowerCase();
  nds.update(RN.map(n=>({id:n.id,hidden:q?(!n.label.toLowerCase().includes(q)&&!n.id.toLowerCase().includes(q)):false})));
});
document.getElementById('fcomm').addEventListener('change',e=>{
  const v=e.target.value;
  nds.update(RN.map(n=>({id:n.id,hidden:v?n.group!==parseInt(v):false})));
});
function resetView(){net.fit({animation:{duration:500,easingFunction:'easeInOutQuad'}});nds.update(RN.map(n=>({id:n.id,hidden:false})));document.getElementById('search').value='';document.getElementById('fcomm').value='';}
window.addEventListener('load',init);
</script></body></html>
