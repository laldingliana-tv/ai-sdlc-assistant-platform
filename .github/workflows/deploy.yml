name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - staging
          - production

# Required secrets:
#   GCP_PROJECT_ID      - Google Cloud project ID
#   GCP_SA_KEY          - Service account key JSON (or use Workload Identity Federation)
#   GCP_REGION          - Deployment region (e.g., us-central1)

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    permissions:
      contents: read
      id-token: write # Required for Workload Identity Federation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          # Option A: Workload Identity Federation (recommended)
          # workload_identity_provider: projects/${{ secrets.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github/providers/github
          # service_account: deploy@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com
          # Option B: Service account key
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      # TODO: Deploy API to Cloud Run
      # - name: Deploy API
      #   run: |
      #     gcloud run deploy ai-sdlc-api \
      #       --image ${{ env.REGISTRY }}/${{ github.repository }}/api:latest \
      #       --region ${{ secrets.GCP_REGION }} \
      #       --platform managed \
      #       --allow-unauthenticated \
      #       --set-env-vars "NODE_ENV=production"

      # TODO: Deploy Web to Cloud Run
      # - name: Deploy Web
      #   run: |
      #     gcloud run deploy ai-sdlc-web \
      #       --image ${{ env.REGISTRY }}/${{ github.repository }}/web:latest \
      #       --region ${{ secrets.GCP_REGION }} \
      #       --platform managed \
      #       --allow-unauthenticated

      # TODO: Deploy Workers to Cloud Run Jobs or GKE
      # - name: Deploy Workers
      #   run: |
      #     gcloud run jobs deploy ai-sdlc-workers \
      #       --image ${{ env.REGISTRY }}/${{ github.repository }}/workers:latest \
      #       --region ${{ secrets.GCP_REGION }} \
      #       --set-env-vars "NODE_ENV=production"

      - name: Deployment placeholder
        run: |
          echo "Deployment to ${{ inputs.environment }} triggered."
          echo "Configure the commented-out steps above with your GCP project details."
